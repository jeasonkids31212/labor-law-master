name: Weekly Labor Law RAG Database Update

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at 00:00 UTC (08:00 Taipei time)
  workflow_dispatch: # Enable manual run via GitHub UI

permissions:
  contents: write

jobs:
  update-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Run RAG database update script
        run: python update_data.py

      - name: Check for database changes
        id: check_changes
        run: |
          git diff --exit-code data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push database updates
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: auto-update RAG static database chunks and manifest [skip ci]"
          git push origin main
